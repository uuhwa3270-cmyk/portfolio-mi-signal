<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#050508;font-family:'Pretendard',-apple-system,sans-serif;}
.bg-grid{position:fixed;inset:0;opacity:0.06;background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:90px 90px;}
.bg-vig{position:fixed;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,transparent,#050508 100%);}
.glow{position:fixed;border-radius:50%;pointer-events:none;opacity:0;transition:opacity 1.2s cubic-bezier(0.4,0,0.2,1),background 1s,transform 1s;}
.glow.on{opacity:1;}
#g1{top:25%;left:30%;width:600px;height:500px;filter:blur(130px);}
#g2{top:40%;left:55%;width:400px;height:350px;filter:blur(90px);}
#g3{top:50%;left:50%;width:200px;height:200px;filter:blur(50px);transform:translate(-50%,-50%) scale(0);}
#g3.on{transform:translate(-50%,-50%) scale(1);}
.pulse-ring{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;border:1px solid transparent;opacity:0;pointer-events:none;}
@keyframes pulseOut{0%{width:80px;height:80px;opacity:0.6;border-color:var(--c)}100%{width:600px;height:600px;opacity:0;border-color:var(--c)}}
.scan{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);height:2px;width:0;border-radius:1px;pointer-events:none;}
@keyframes scanGo{0%{width:0;opacity:1}50%{width:60vw;opacity:0.5}100%{width:80vw;opacity:0}}
.hero{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
.title{font-size:clamp(22px,2.4vw,32px);color:rgba(255,255,255,0.6);letter-spacing:0.14em;font-weight:400;opacity:0;transform:translateY(16px);transition:all 1s cubic-bezier(0.4,0,0.2,1);}
.title.on{opacity:1;transform:translateY(0);}
.pill{display:inline-flex;align-items:center;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:999px;padding:clamp(22px,3vh,32px) clamp(44px,6vw,96px);backdrop-filter:blur(16px);margin-top:clamp(50px,8vh,100px);opacity:0;transform:scale(0.95) translateY(10px);transition:all 0.7s cubic-bezier(0.4,0,0.2,1) 0.3s;}
.pill.on{opacity:1;transform:scale(1) translateY(0);}
.pill-logo{font-size:clamp(17px,1.6vw,24px);color:rgba(255,255,255,0.35);font-weight:500;}
.pill-sep{width:1.5px;height:clamp(28px,3.5vh,40px);margin:0 clamp(20px,2.2vw,32px);opacity:0.7;animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:0.8}50%{opacity:0.1}}
.pill-icon{width:clamp(34px,3.5vw,48px);height:clamp(34px,3.5vw,48px);border-radius:11px;margin-right:clamp(12px,1.3vw,18px);object-fit:cover;opacity:0;transform:scale(0.8) rotate(-5deg);transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);}
.pill-icon.on{opacity:1;transform:scale(1) rotate(0);}
.pill-name{font-size:clamp(26px,2.8vw,40px);font-weight:700;color:#fff;opacity:0;transform:translateX(-8px);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}
.pill-name.on{opacity:1;transform:translateX(0);}
.pill-dot{width:clamp(11px,1.2vw,15px);height:clamp(11px,1.2vw,15px);border-radius:50%;margin:0 clamp(12px,1.4vw,20px);transform:scale(0);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.pill-dot.on{transform:scale(1);}
.pill-state{font-size:clamp(20px,2.2vw,30px);font-weight:500;opacity:0;transform:translateX(8px);transition:all 0.35s cubic-bezier(0.4,0,0.2,1);}
.pill-state.on{opacity:1;transform:translateX(0);}
.sub{font-size:clamp(13px,1.2vw,17px);color:rgba(255,255,255,0.18);letter-spacing:0.06em;margin-top:clamp(50px,8vh,100px);opacity:0;transition:opacity 1s 0.5s;}
.sub.on{opacity:1;}
.ev-svg{position:fixed;inset:0;pointer-events:none;z-index:7;}
.ev-path{stroke-dasharray:350;stroke-dashoffset:350;transition:stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1);}
.ev-path.on{stroke-dashoffset:0;}
.ev-wrap{position:fixed;inset:0;z-index:8;pointer-events:none;}
.ev-card{position:absolute;opacity:0;transform:translateY(8px) scale(0.92);transition:all 0.55s cubic-bezier(0.4,0,0.2,1);background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:clamp(12px,1.5vh,18px) clamp(16px,1.8vw,24px);backdrop-filter:blur(8px);max-width:clamp(170px,18vw,240px);}
.ev-card.on{opacity:1;transform:translateY(0) scale(1);}
.ev-card-label{font-size:clamp(11px,1vw,14px);font-weight:500;margin-bottom:4px;letter-spacing:0.03em;}
.ev-card-desc{font-size:clamp(13px,1.2vw,17px);color:rgba(255,255,255,0.8);line-height:1.4;}
.ev-card::before{content:'';position:absolute;width:6px;height:6px;border-radius:50%;top:50%;transform:translateY(-50%);background:var(--c);box-shadow:0 0 8px var(--c);}
.ev-card.left::before{right:-14px;}
.ev-card.right::before{left:-14px;}
@keyframes glitch{0%{transform:translate(0);opacity:1}10%{transform:translate(-3px,1px);opacity:0.8}20%{transform:translate(3px,-1px);opacity:0.9}30%{transform:translate(-1px,2px);opacity:0.7}40%{transform:translate(2px,-1px)}50%{transform:translate(0);opacity:0.85}100%{transform:translate(0);opacity:1}}
.glitch{animation:glitch 0.2s ease-in-out;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:0.01s!important;}}
</style>
</head>
<body>
